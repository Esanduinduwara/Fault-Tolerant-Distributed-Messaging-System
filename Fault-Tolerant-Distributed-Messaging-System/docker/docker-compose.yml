# =============================================================================
# =============================================================================

# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# QUORUM-BASED REPLICATION STRATEGY (Part 2: Data Replication)
# ─────────────────────────────────────────────────────────────────────────────
# We deploy 3 Kafka brokers with the following settings:
#   replication.factor      = 3  → each partition has 3 copies (one per broker)
#   min.insync.replicas     = 2  → at least 2 replicas must confirm a write
#   producer acks           = all → producer waits for ALL in-sync replicas
#
# This forms a QUORUM: writes succeed only when a majority (2 out of 3)
# of replicas acknowledge.  Benefits:
#   ✅ Zero data loss on single-broker failure (2 copies remain)
#   ✅ Automatic leader election by Kafka (via Zookeeper) on broker crash
#   ✅ No split-brain: only in-sync replicas participate in quorum
#
# Trade-offs:
#   ⚠️ Higher write latency (must wait for 2 acks instead of 1)
#   ⚠️ 3× storage for each message (replicated across 3 brokers)
#   ⚠️ Requires at least 2 brokers UP to accept any writes
#
# This is a PRIMARY-BACKUP replication model:
#   - Kafka elects ONE broker as the partition LEADER (primary)
#   - The other 2 brokers are FOLLOWERS (backups) that replicate the leader
#   - All reads and writes go through the leader
#   - If the leader fails, a follower is promoted automatically
# ─────────────────────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streamflow_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ─────────────────────────────────────────────────────────────────────────
  # DAY 3   — Broker 1 (leader)
  # ─────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamflow_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      # ── Quorum replication settings ──────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # DAY 3  — Broker 2 (follower / backup replica)
  # Second broker in the cluster.  Kafka automatically assigns it as a
  # follower for partitions led by broker 1 and as a leader for partitions
  # assigned to it by the controller.
  # ─────────────────────────────────────────────────────────────────────────
  kafka2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamflow_kafka2
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # DAY 3  Broker 3 (follower / backup replica)
  # Third broker completes the 3-broker quorum cluster.
  # With 3 brokers the cluster can tolerate 1 broker failure and still
  # satisfy min.insync.replicas=2 for all write operations.
  # ─────────────────────────────────────────────────────────────────────────
  kafka3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamflow_kafka3
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:29094,PLAINTEXT_HOST://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9094"]
      interval: 15s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: streamflow_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: messaging_app
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: streamflow_kafdrop
    restart: unless-stopped
    depends_on:
      - kafka
      - kafka2
      - kafka3
    ports:
      - "9000:9000"
    environment:
      # Connect Kafdrop to ALL 3 brokers so it can browse all partition replicas
      KAFKA_BROKERCONNECT: kafka:29092,kafka2:29093,kafka3:29094
      JVM_OPTS: "-Xms32M -Xmx64M"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: streamflow_api
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # All 3 brokers listed — the producer/consumer client will use any
      # reachable broker as the initial bootstrap, then discover the rest.
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka2:29093,kafka3:29094
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/messaging_app?authSource=admin
      MONGODB_DATABASE: messaging_app
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # NOTE: container_name removed intentionally so that
  # `docker compose up --scale consumer=2` works correctly.
  # With container_name set, Docker refuses to create a second container.
  # ─────────────────────────────────────────────────────────────────────────
  consumer:
    build:
      context: ..
      dockerfile: docker/consumer.Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka2:29093,kafka3:29094
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/messaging_app?authSource=admin
      MONGODB_DATABASE: messaging_app
      CONSUMER_NODE_ID: consumer-1

volumes:
  mongodb_data:
